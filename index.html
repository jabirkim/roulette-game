<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>카지노 룰렛</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">EUROPEAN ROULETTE</p>
          <h1>카지노 룰렛</h1>
          <nav class="game-switch">
            <a class="switch-link active" href="./">룰렛</a>
            <a class="switch-link" href="slot-machine-3x3/">슬롯 3x3</a>
          </nav>
        </div>
        <details class="detail-box">
          <summary>자세히</summary>
          <div class="detail-content">
            <p><strong>배당</strong></p>
            <ul>
              <li>레드/블랙 · 홀/짝 · 1-18/19-36 → 1:1</li>
              <li>단일 숫자 → 35:1</li>
              <li>유럽식 룰렛 → 0~36</li>
            </ul>
            <p>여러 곳에 동시에 베팅하면 일부 적중해도 <strong>순손익은 마이너스</strong>일 수 있습니다.</p>
          </div>
        </details>
      </header>

      <main class="main-grid">
        <section class="card status-card">
          <div class="stat-grid">
            <div class="stat">
              <span>잔액</span>
              <strong id="balance">₩100,000</strong>
            </div>
            <div class="stat highlight">
              <span>총 베팅</span>
              <strong id="currentBet">₩0</strong>
            </div>
            <div class="stat" id="netStat">
              <span>최근 순손익</span>
              <strong id="lastNet">₩0</strong>
            </div>
          </div>
        </section>

        <section class="card wheel-card">
          <div class="wheel-stage">
            <div class="wheel-glow"></div>
            <div class="wheel" id="wheel">
              <div class="wheel-center">0-36</div>
            </div>
            <div class="wheel-pointer"></div>
          </div>
          <div class="result-row">
            <span>최근 결과</span>
            <strong id="lastResultValue">대기 중</strong>
          </div>
        </section>

        <section class="card control-card">
          <div class="amount-row">
            <label class="field grow">
              <span>베팅 금액</span>
              <input id="betAmount" type="number" min="1000" step="1000" value="5000" />
            </label>
            <button id="clearBets" class="ghost-button">초기화</button>
          </div>

          <div class="bet-section">
            <div class="section-head">
              <h2>빠른 베팅</h2>
              <small>1:1 / 35:1</small>
            </div>
            <div class="bet-grid">
              <button class="bet-button red" data-bet-type="color" data-bet-value="red">레드</button>
              <button class="bet-button black" data-bet-type="color" data-bet-value="black">블랙</button>
              <button class="bet-button green" data-bet-type="single" data-bet-value="0">0</button>
              <button class="bet-button" data-bet-type="parity" data-bet-value="odd">홀수</button>
              <button class="bet-button" data-bet-type="parity" data-bet-value="even">짝수</button>
              <button class="bet-button" data-bet-type="range" data-bet-value="low">1-18</button>
              <button class="bet-button" data-bet-type="range" data-bet-value="high">19-36</button>
            </div>
          </div>

          <div class="bet-section">
            <div class="section-head">
              <h2>단일 숫자</h2>
              <small>35:1</small>
            </div>
            <div class="number-row">
              <label class="field grow">
                <span>숫자 선택</span>
                <input id="singleNumber" type="number" min="0" max="36" value="17" />
              </label>
              <button id="addNumberBet" class="bet-button accent">추가</button>
            </div>
          </div>

          <div class="bet-section">
            <div class="section-head">
              <h2>현재 베팅 위치</h2>
              <strong id="betCount">0개</strong>
            </div>
            <div id="betChips" class="bet-chips">
              <span class="chip placeholder-chip">아직 베팅이 없습니다.</span>
            </div>
          </div>

          <div class="action-bar">
            <button id="spinButton" class="spin-button">스핀</button>
          </div>

          <div class="message-box" id="resultText">베팅을 올리고 휠을 돌리세요.</div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
